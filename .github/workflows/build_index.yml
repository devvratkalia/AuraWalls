name: Generate Wallpaper Index

# This tells the robot to run every time you push to the 'main' branch
on:
  push:
    branches:
      - main

# Ensure the robot has permission to save the file
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Python Script
        run: python generate_index.py

      - name: Commit and Push index.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          # Only commit if the file actually changed
          git commit -m "Auto-update index.json via GitHub Actions" || echo "No changes to commit"
          git push
